name: reversesearchdev
version: 1.0.39
description: "reversesearch 项目 Dev Agent — 技术方案设计、Codex/Cursor 代码实现、飞书协作"
hermes_requires: '>=0.16.0'
author: reversesearch team
license: internal
env_requires:
- name: FEISHU_APP_ID
  description: "飞书应用 App ID（Gateway 接入）"
- name: FEISHU_APP_SECRET
  description: "飞书应用 App Secret"
- name: FEISHU_CONNECTION_MODE
  description: "飞书连接模式"
  required: false
  default: websocket
- name: FEISHU_DM_POLICY
  description: "飞书私聊策略"
  required: false
  default: pairing
- name: FEISHU_GROUP_POLICY
  description: "飞书群聊策略"
  required: false
  default: open
- name: FEISHU_ALLOW_ALL_USERS
  description: "是否允许所有飞书用户"
  required: false
  default: 'true'
- name: FEISHU_DOMAIN
  description: "飞书域名"
  required: false
  default: feishu
- name: FEISHU_HOME_CHANNEL
  description: "飞书通知群 chat_id（distribution 同步/cron 输出）。在目标群 @机器人 发送 /set-home，或从群设置复制 oc_ 开头的 ID"
- name: XIAOMI_API_KEY
  description: "小米 Mimo API Key（仅当 config.yaml provider 为 xiaomi 时需要）"
  required: false
- name: XIAOMI_BASE_URL
  description: "小米 Mimo API Base URL"
  required: false
  default: https://token-plan-cn.xiaomimimo.com/v1
- name: OPENAI_API_KEY
  description: "OpenAI 兼容 API Key（provider 为 openai/openrouter 等时需要）"
  required: false
publish:
  branch: main
  conflict_strategy: distribution_branch
  conflict_branch_prefix: distribution/Conflict
distribution_owned:
- SOUL.md
- config.yaml
- distribution.yaml
- skills
- scripts
- .gitignore
source: git@github.com:research-limingjun/reversesearchdev.git
installed_at: '2026-06-16T02:43:19+00:00'
